<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Household Expense Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#222;min-height:100vh}
.app{padding:1rem;max-width:700px;margin:0 auto}
h1{font-size:18px;font-weight:600;color:#222;margin-bottom:2px}
.subtitle{font-size:12px;color:#888;margin-bottom:1rem}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:#e8e8e8;border-radius:8px;padding:4px}
.tab{flex:1;padding:7px 0;font-size:12px;font-weight:500;border:none;background:transparent;color:#666;border-radius:6px;cursor:pointer;transition:all .15s}
.tab.active{background:#fff;color:#222;border:0.5px solid #ddd;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.section{display:none}.section.active{display:block}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.metric{background:#fff;border-radius:8px;padding:12px 14px;border:0.5px solid #e0e0e0}
.metric-label{font-size:12px;color:#888;margin-bottom:4px}
.metric-val{font-size:20px;font-weight:600;color:#222}
.metric-val.danger{color:#c0392b}.metric-val.warn{color:#d68910}.metric-val.ok{color:#1d9e75}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:500;color:#888;margin-bottom:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row label{font-size:12px;color:#666;display:block;margin-bottom:4px}
input,select{width:100%;font-size:14px;padding:8px 10px;border:0.5px solid #ccc;border-radius:6px;outline:none;background:#fff;color:#222}
input:focus,select:focus{border-color:#185FA5}
.btn{padding:8px 18px;font-size:13px;font-weight:500;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#222;cursor:pointer}
.btn:active{transform:scale(.98)}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-danger{background:transparent;color:#c0392b;border-color:#c0392b;font-size:12px;padding:4px 10px}
.btn-success{background:transparent;color:#1d9e75;border-color:#1d9e75;font-size:12px;padding:4px 10px}
.btn-sm{font-size:12px;padding:5px 12px}
.expense-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto}
.expense-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f9f9f9;border-radius:8px;font-size:13px}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.expense-desc{flex:1;color:#222;font-weight:500}
.expense-meta{font-size:11px;color:#999}
.expense-amt{font-weight:500;color:#222;margin-right:6px;white-space:nowrap}
.budget-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.budget-row label{font-size:13px;color:#666;width:120px;flex-shrink:0}
.progress-bar-bg{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-top:4px}
.progress-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:#999;margin-top:4px}
.cat-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.cat-pill{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.month-select{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.month-select select{max-width:180px}
.alert-banner{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem}
.alert-over{background:#fcebeb;color:#a32d2d;border:0.5px solid #f09595}
.alert-near{background:#faeeda;color:#854f0b;border:0.5px solid #fac775}
.bl-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.bl-tab{padding:6px 16px;font-size:13px;font-weight:500;border:0.5px solid #ccc;border-radius:8px;background:transparent;color:#666;cursor:pointer}
.bl-tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px}
.badge-lent{background:#e1f5ee;color:#085041}
.badge-borrow{background:#fcebeb;color:#a32d2d}
.badge-overdue{background:#faeeda;color:#854f0b}
.badge-settled{background:#f1efe8;color:#5f5e5a}
.bl-item{display:flex;flex-direction:column;gap:4px;padding:12px;background:#f9f9f9;border-radius:8px;font-size:13px;margin-bottom:6px}
.bl-item.settled{opacity:.55}
.bl-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bl-name{font-weight:500;flex:1;color:#222}
.bl-meta{font-size:11px;color:#999}
.bl-actions{display:flex;gap:6px;margin-top:4px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.summary-card{border-radius:8px;padding:12px 14px;border:0.5px solid}
.summary-lent{background:#e1f5ee;border-color:#5dcaa5}
.summary-borrow{background:#fcebeb;border-color:#f09595}
.summary-title{font-size:12px;font-weight:500;margin-bottom:4px}
.summary-lent .summary-title{color:#085041}
.summary-borrow .summary-title{color:#a32d2d}
.summary-amt{font-size:20px;font-weight:600}
.summary-lent .summary-amt{color:#0f6e56}
.summary-borrow .summary-amt{color:#c0392b}
@media(max-width:480px){
  .metric-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .summary-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <div>
      <h1>Household Expenses</h1>
      <div class="subtitle" id="cur-month-label"></div>
    </div>
    <div style="font-size:22px;color:#888">₹</div>
  </div>

  <div id="alert-banner" style="display:none" class="alert-banner"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="switchTab('add')">+ Add</button>
    <button class="tab" onclick="switchTab('history')">History</button>
    <button class="tab" onclick="switchTab('budget')">Budget</button>
    <button class="tab" onclick="switchTab('borrowlend')">Borrow &amp; Lend</button>
  </div>

  <!-- DASHBOARD -->
  <div class="section active" id="tab-dashboard">
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">This month</div><div class="metric-val" id="m-total">₹0</div></div>
      <div class="metric"><div class="metric-label">Today</div><div class="metric-val" id="m-today">₹0</div></div>
      <div class="metric"><div class="metric-label">Budget left</div><div class="metric-val" id="m-left">—</div></div>
    </div>
    <div class="summary-grid">
      <div class="summary-card summary-lent"><div class="summary-title">They owe you</div><div class="summary-amt" id="d-owed">₹0</div><div style="font-size:11px;color:#0
